name: Build Windows (x64)

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

env:
  VSCODE_VERSION: '1.109.5'
  NODE_VERSION: '22.21.1'

jobs:
  build:
    runs-on: windows-2022
    timeout-minutes: 180

    steps:
      - name: Configure Git for Windows
        shell: bash
        run: |
          git config --global core.longpaths true
          git config --global core.autocrlf false

      - name: Checkout RiteMark
        uses: actions/checkout@v4
        with:
          path: r

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # --- VS Code source (cached shallow clone) ---
      - name: Cache VS Code source
        id: cache-vscode-src
        uses: actions/cache@v4
        with:
          path: r/vscode
          key: vscode-src-${{ env.VSCODE_VERSION }}

      - name: Clone VS Code OSS
        if: steps.cache-vscode-src.outputs.cache-hit != 'true'
        shell: bash
        run: |
          git clone --depth 1 --branch ${{ env.VSCODE_VERSION }} https://github.com/microsoft/vscode.git r/vscode
          echo "VS Code ${{ env.VSCODE_VERSION }} cloned"

      - name: Reset VS Code source (if cached)
        if: steps.cache-vscode-src.outputs.cache-hit == 'true'
        shell: bash
        working-directory: r/vscode
        run: |
          git checkout -- . 2>/dev/null || true
          git clean -fd 2>/dev/null || true
          echo "VS Code source reset to clean state"

      # --- Copy extension ---
      - name: Copy extension (replace symlink)
        shell: bash
        working-directory: r
        run: |
          rm -rf vscode/extensions/ritemark 2>/dev/null || true
          rm -rf extensions/ritemark/binaries/darwin-arm64 2>/dev/null || true
          cp -R extensions/ritemark vscode/extensions/ritemark
          echo "Extension copied to vscode/extensions/ritemark"

      # --- Dependency caches ---
      - name: Cache VS Code node_modules
        id: cache-vscode-deps
        uses: actions/cache@v4
        with:
          path: r/vscode/node_modules
          key: vscode-deps-win-${{ env.VSCODE_VERSION }}-${{ hashFiles('r/vscode/package-lock.json', 'r/vscode/.npmrc') }}
          restore-keys: |
            vscode-deps-win-${{ env.VSCODE_VERSION }}-

      - name: Cache VS Code build sub-dependencies
        uses: actions/cache@v4
        with:
          path: |
            r/vscode/build/node_modules
            r/vscode/remote/node_modules
          key: vscode-subdeps-win-${{ env.VSCODE_VERSION }}-${{ hashFiles('r/vscode/build/package-lock.json', 'r/vscode/remote/package-lock.json') }}
          restore-keys: |
            vscode-subdeps-win-${{ env.VSCODE_VERSION }}-

      - name: Cache Electron headers
        uses: actions/cache@v4
        with:
          path: ~/AppData/Local/node-gyp
          key: electron-headers-win-${{ env.VSCODE_VERSION }}

      - name: Cache extension node_modules
        id: cache-ext-deps
        uses: actions/cache@v4
        with:
          path: r/vscode/extensions/ritemark/node_modules
          key: ext-deps-win-${{ hashFiles('r/extensions/ritemark/package-lock.json') }}
          restore-keys: |
            ext-deps-win-

      # --- Install dependencies ---
      - name: Install VS Code dependencies
        if: steps.cache-vscode-deps.outputs.cache-hit != 'true'
        shell: bash
        working-directory: r/vscode
        env:
          ELECTRON_SKIP_BINARY_DOWNLOAD: 1
          PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: 1
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          success=0
          for i in 1 2 3; do
            echo "Attempt $i..."
            if npm install; then
              success=1
              break
            fi
            echo "Attempt $i failed, retrying..."
            sleep 10
          done
          if [ "$success" -ne 1 ]; then
            echo "VS Code dependency install failed after 3 attempts" >&2
            exit 1
          fi

      - name: Verify VS Code dependencies (cached)
        if: steps.cache-vscode-deps.outputs.cache-hit == 'true'
        shell: bash
        working-directory: r/vscode
        env:
          ELECTRON_SKIP_BINARY_DOWNLOAD: 1
          PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: 1
        run: |
          echo "Using cached node_modules, running postinstall..."
          npm run postinstall 2>/dev/null || true

      - name: Install extension dependencies
        if: steps.cache-ext-deps.outputs.cache-hit != 'true'
        shell: bash
        working-directory: r/vscode/extensions/ritemark
        run: npm install --legacy-peer-deps

      - name: Remove non-Windows binaries from claude-agent-sdk
        shell: bash
        working-directory: r/vscode/extensions/ritemark
        run: |
          SDK_VENDOR="node_modules/@anthropic-ai/claude-agent-sdk/vendor"
          if [ -d "$SDK_VENDOR/ripgrep" ]; then
            echo "Removing non-Windows ripgrep binaries..."
            rm -rf "$SDK_VENDOR/ripgrep/arm64-darwin"
            rm -rf "$SDK_VENDOR/ripgrep/arm64-linux"
            rm -rf "$SDK_VENDOR/ripgrep/x64-darwin"
            rm -rf "$SDK_VENDOR/ripgrep/x64-linux"
            echo "Kept only: $(ls $SDK_VENDOR/ripgrep/ 2>/dev/null || echo 'none')"
          fi

      # --- Patch and compile ---
      - name: Remove conflicting files before patching
        shell: bash
        working-directory: r/vscode
        run: |
          rm -f src/vs/workbench/contrib/welcomeGettingStarted/browser/media/gettingStartedGuide.css 2>/dev/null || true

      - name: Apply patches
        shell: bash
        working-directory: r
        run: ./scripts/apply-patches.sh

      - name: Compile extension
        shell: bash
        working-directory: r/vscode/extensions/ritemark
        run: npm run compile

      - name: Clean webview dev files before build
        shell: bash
        working-directory: r/vscode/extensions/ritemark
        run: |
          rm -rf webview/node_modules 2>/dev/null || true
          rm -rf webview/src 2>/dev/null || true
          echo "Cleaned webview dev files (prevents EMFILE during bundling)"

      # --- Free memory before build ---
      - name: Free disk and memory for build
        shell: pwsh
        run: |
          # Stop non-essential services to free RAM
          Get-Service -Name 'wuauserv','WSearch','DiagTrack','SysMain' -ErrorAction SilentlyContinue |
            Where-Object { $_.Status -eq 'Running' } |
            Stop-Service -Force -ErrorAction SilentlyContinue
          # Report available memory
          $os = Get-CimInstance Win32_OperatingSystem
          $freeMB = [math]::Round($os.FreePhysicalMemory / 1024)
          $totalMB = [math]::Round($os.TotalVisibleMemorySize / 1024)
          Write-Output "Memory: ${freeMB}MB free / ${totalMB}MB total"

      # --- Build ---
      - name: Build VS Code (win32-x64-min)
        shell: bash
        working-directory: r/vscode
        env:
          NODE_OPTIONS: --max-old-space-size=8192
        run: |
          LOG_FILE="../windows-build.log"
          : > "$LOG_FILE"
          echo "Starting Windows build at $(date)" | tee -a "$LOG_FILE"
          npx gulp vscode-win32-x64-min \
            > >(tee -a "$LOG_FILE") \
            2> >(tee -a "$LOG_FILE" >&2) &
          BUILD_PID=$!

          while kill -0 "$BUILD_PID" 2>/dev/null; do
            echo "Windows build still running at $(date)" | tee -a "$LOG_FILE"
            sleep 300
          done

          wait "$BUILD_PID"
          echo "Build completed at $(date)" | tee -a "$LOG_FILE"

      - name: Upload Windows build log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: windows-build-log
          path: r/windows-build.log
          retention-days: 14

      # --- Package ---
      - name: Copy extension to build output
        shell: bash
        working-directory: r
        run: |
          BUILD_DIR="VSCode-win32-x64"
          EXT_DEST="$BUILD_DIR/resources/app/extensions/ritemark"
          WELCOME_DEST="$BUILD_DIR/resources/app/out/vs/workbench/contrib/welcomeGettingStarted/browser/media"

          if [ ! -d "$BUILD_DIR" ]; then
            echo "ERROR: Build output not found at $BUILD_DIR"
            exit 1
          fi

          rm -rf "$EXT_DEST" || true
          cp -R vscode/extensions/ritemark "$EXT_DEST"
          rm -rf "$EXT_DEST/webview/node_modules" 2>/dev/null || true
          rm -rf "$EXT_DEST/webview/src" 2>/dev/null || true
          ./scripts/copy-welcome-assets.sh "$WELCOME_DEST"
          echo "Extension copied successfully"

      - name: Validate build
        shell: bash
        working-directory: r
        run: |
          BUILD_DIR="VSCode-win32-x64"
          EXT_PATH="$BUILD_DIR/resources/app/extensions/ritemark"
          ERRORS=0

          if [ -f "$EXT_PATH/media/webview.js" ]; then
            WEBVIEW_SIZE=$(wc -c < "$EXT_PATH/media/webview.js" | tr -d ' ')
            if [ "$WEBVIEW_SIZE" -lt 500000 ]; then
              echo "FAIL: webview.js too small ($WEBVIEW_SIZE bytes)"
              ERRORS=$((ERRORS + 1))
            else
              echo "OK: webview.js ($WEBVIEW_SIZE bytes)"
            fi
          else
            echo "FAIL: webview.js not found"
            ERRORS=$((ERRORS + 1))
          fi

          if [ -f "$EXT_PATH/out/extension.js" ]; then
            EXTENSION_SIZE=$(wc -c < "$EXT_PATH/out/extension.js" | tr -d ' ')
            if [ "$EXTENSION_SIZE" -lt 1000 ]; then
              echo "FAIL: extension.js too small ($EXTENSION_SIZE bytes)"
              ERRORS=$((ERRORS + 1))
            else
              echo "OK: extension.js ($EXTENSION_SIZE bytes)"
            fi
          else
            echo "FAIL: extension.js not found"
            ERRORS=$((ERRORS + 1))
          fi

          if [ -f "$BUILD_DIR/resources/app/out/vs/workbench/contrib/welcomeGettingStarted/browser/media/ritemark-welcome-logo-full.svg" ] && \
             [ -f "$BUILD_DIR/resources/app/out/vs/workbench/contrib/welcomeGettingStarted/browser/media/ritemark-welcome-hero-bg.png" ]; then
            echo "OK: Welcome assets present"
          else
            echo "FAIL: Welcome assets missing"
            ERRORS=$((ERRORS + 1))
          fi

          if [ $ERRORS -gt 0 ]; then
            echo "Validation FAILED with $ERRORS error(s)"
            exit 1
          fi
          echo "Validation PASSED"

      - name: Upload ZIP artifact
        uses: actions/upload-artifact@v4
        with:
          name: ritemark-windows-x64
          path: r/VSCode-win32-x64/
          retention-days: 30

      - name: Build summary
        shell: bash
        working-directory: r
        run: |
          echo "========================================"
          echo "Windows Build Complete"
          echo "========================================"
          echo ""
          echo "Build contents:"
          ls -lh VSCode-win32-x64/ | head -10
          echo ""
          echo "Extension:"
          ls -lh VSCode-win32-x64/resources/app/extensions/ritemark/ | head -10
          echo ""
          echo "Artifact: ritemark-windows-x64"
