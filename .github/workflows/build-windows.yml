name: Build Windows (x64)

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  compile:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout RiteMark
        uses: actions/checkout@v4
        with:
          path: r

      - name: Clone VS Code OSS (1.109.5)
        shell: bash
        run: |
          git clone --depth 1 --branch 1.109.5 https://github.com/microsoft/vscode.git r/vscode
          echo "VS Code 1.109.5 cloned"

      - name: Setup Node.js 22.21.1
        uses: actions/setup-node@v4
        with:
          node-version: '22.21.1'

      - name: Copy extension (replace symlink)
        shell: bash
        working-directory: r
        run: |
          rm -rf vscode/extensions/ritemark 2>/dev/null || true
          cp -R extensions/ritemark vscode/extensions/ritemark
          echo "Extension copied to vscode/extensions/ritemark"

      - name: Install VS Code dependencies
        shell: bash
        working-directory: r/vscode
        env:
          ELECTRON_SKIP_BINARY_DOWNLOAD: 1
          PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: 1
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          for i in 1 2 3; do
            echo "Attempt $i..."
            npm install && break || echo "Attempt $i failed, retrying..."
            sleep 10
          done

      - name: Install extension dependencies
        shell: bash
        working-directory: r/vscode/extensions/ritemark
        run: npm install --legacy-peer-deps

      - name: Apply patches
        shell: bash
        working-directory: r
        run: ./scripts/apply-patches.sh

      - name: Compile extension
        shell: bash
        working-directory: r/vscode/extensions/ritemark
        run: npm run compile

      - name: Build compilation artifact
        shell: bash
        working-directory: r/vscode
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm exec -- npm-run-all2 -lp core-ci extensions-ci

      - name: Validate compilation folders
        shell: bash
        working-directory: r/vscode
        run: |
          [ -d "out-build" ] || { echo "ERROR: out-build folder is missing" >&2; exit 1; }
          [ -n "$(find out-build -mindepth 1 | head -1)" ] || { echo "ERROR: out-build folder is empty" >&2; exit 1; }
          ls -d out-vscode-* >/dev/null 2>&1 || { echo "ERROR: No out-vscode-* folders found" >&2; exit 1; }
          for folder in out-vscode-*; do
            [ -d "$folder" ] || { echo "ERROR: $folder is missing" >&2; exit 1; }
            [ -n "$(find "$folder" -mindepth 1 | head -1)" ] || { echo "ERROR: $folder is empty" >&2; exit 1; }
          done
          echo "Compilation folders look correct"

      - name: Pack compilation artifact
        shell: bash
        working-directory: r/vscode
        run: |
          tar -czf ../compilation.tar.gz $(ls -d .build out-* 2>/dev/null)
          ls -lh ../compilation.tar.gz

      - name: Upload compilation artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-compilation
          path: r/compilation.tar.gz
          retention-days: 7

  build:
    needs: compile
    runs-on: windows-latest
    timeout-minutes: 180

    steps:
      - name: Configure Git for Windows
        shell: bash
        run: |
          git config --global core.longpaths true
          git config --global core.autocrlf false

      - name: Checkout RiteMark
        uses: actions/checkout@v4
        with:
          path: r

      - name: Clone VS Code OSS (1.109.5)
        shell: bash
        run: |
          git clone --depth 1 --branch 1.109.5 https://github.com/microsoft/vscode.git r/vscode
          echo "VS Code 1.109.5 cloned"

      - name: Setup Node.js 22.21.1
        uses: actions/setup-node@v4
        with:
          node-version: '22.21.1'

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Download compilation artifact
        uses: actions/download-artifact@v4
        with:
          name: windows-compilation
          path: r

      - name: Copy extension (replace symlink)
        shell: bash
        working-directory: r
        run: |
          rm -rf vscode/extensions/ritemark 2>/dev/null || true
          rm -rf extensions/ritemark/binaries/darwin-arm64 2>/dev/null || true
          cp -R extensions/ritemark vscode/extensions/ritemark
          echo "Extension copied to vscode/extensions/ritemark"

      - name: Install VS Code dependencies
        shell: bash
        working-directory: r/vscode
        env:
          npm_config_disturl: https://electronjs.org/headers
          npm_config_target: 30.5.1
          npm_config_runtime: electron
          npm_config_build_from_source: true
          ELECTRON_SKIP_BINARY_DOWNLOAD: 1
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          for i in 1 2 3; do
            echo "Attempt $i..."
            npm install && break || echo "Attempt $i failed, retrying..."
            sleep 10
          done

      - name: Install extension dependencies
        shell: bash
        working-directory: r/vscode/extensions/ritemark
        run: npm install --legacy-peer-deps

      - name: Remove non-Windows binaries from claude-agent-sdk
        shell: bash
        working-directory: r/vscode/extensions/ritemark
        run: |
          SDK_VENDOR="node_modules/@anthropic-ai/claude-agent-sdk/vendor"
          if [ -d "$SDK_VENDOR/ripgrep" ]; then
            echo "Removing non-Windows ripgrep binaries..."
            rm -rf "$SDK_VENDOR/ripgrep/arm64-darwin"
            rm -rf "$SDK_VENDOR/ripgrep/arm64-linux"
            rm -rf "$SDK_VENDOR/ripgrep/x64-darwin"
            rm -rf "$SDK_VENDOR/ripgrep/x64-linux"
            echo "Kept only: $(ls $SDK_VENDOR/ripgrep/)"
          fi

      - name: Apply patches
        shell: bash
        working-directory: r
        run: ./scripts/apply-patches.sh

      - name: Extract compilation artifact
        shell: bash
        working-directory: r/vscode
        run: |
          [ -f ../compilation.tar.gz ] || { echo "ERROR: compilation artifact missing" >&2; exit 1; }
          tar -xzf ../compilation.tar.gz

      - name: Compile extension
        shell: bash
        working-directory: r/vscode/extensions/ritemark
        run: npm run compile

      - name: Build VS Code (win32-x64-min-ci)
        shell: bash
        working-directory: r/vscode
        run: |
          LOG_FILE="../windows-build.log"
          : > "$LOG_FILE"
          echo "Starting Windows build at $(date)"
          npm run gulp vscode-win32-x64-min-ci \
            > >(tee -a "$LOG_FILE") \
            2> >(tee -a "$LOG_FILE" >&2) &
          BUILD_PID=$!

          while kill -0 "$BUILD_PID" 2>/dev/null; do
            echo "Windows build still running at $(date)" | tee -a "$LOG_FILE"
            sleep 300
          done

          wait "$BUILD_PID"
          echo "Build completed at $(date)" | tee -a "$LOG_FILE"

      - name: Upload Windows build log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: windows-build-log
          path: r/windows-build.log
          retention-days: 14

      - name: Copy extension to build output
        shell: bash
        working-directory: r
        run: |
          BUILD_DIR="VSCode-win32-x64"
          EXT_DEST="$BUILD_DIR/resources/app/extensions/ritemark"
          WELCOME_DEST="$BUILD_DIR/resources/app/out/vs/workbench/contrib/welcomeGettingStarted/browser/media"

          if [ ! -d "$BUILD_DIR" ]; then
            echo "ERROR: Build output not found at $BUILD_DIR"
            exit 1
          fi

          rm -rf "$EXT_DEST" || true
          cp -R vscode/extensions/ritemark "$EXT_DEST"
          rm -rf "$EXT_DEST/webview/node_modules" 2>/dev/null || true
          rm -rf "$EXT_DEST/webview/src" 2>/dev/null || true
          ./scripts/copy-welcome-assets.sh "$WELCOME_DEST"
          echo "Extension copied successfully"

      - name: Validate build
        shell: bash
        working-directory: r
        run: |
          BUILD_DIR="VSCode-win32-x64"
          EXT_PATH="$BUILD_DIR/resources/app/extensions/ritemark"
          ERRORS=0

          if [ -f "$EXT_PATH/media/webview.js" ]; then
            WEBVIEW_SIZE=$(wc -c < "$EXT_PATH/media/webview.js" | tr -d ' ')
            if [ "$WEBVIEW_SIZE" -lt 500000 ]; then
              echo "FAIL: webview.js too small ($WEBVIEW_SIZE bytes)"
              ERRORS=$((ERRORS + 1))
            else
              echo "OK: webview.js ($WEBVIEW_SIZE bytes)"
            fi
          else
            echo "FAIL: webview.js not found"
            ERRORS=$((ERRORS + 1))
          fi

          if [ -f "$EXT_PATH/out/extension.js" ]; then
            EXTENSION_SIZE=$(wc -c < "$EXT_PATH/out/extension.js" | tr -d ' ')
            if [ "$EXTENSION_SIZE" -lt 1000 ]; then
              echo "FAIL: extension.js too small ($EXTENSION_SIZE bytes)"
              ERRORS=$((ERRORS + 1))
            else
              echo "OK: extension.js ($EXTENSION_SIZE bytes)"
            fi
          else
            echo "FAIL: extension.js not found"
            ERRORS=$((ERRORS + 1))
          fi

          if [ -f "$BUILD_DIR/resources/app/out/vs/workbench/contrib/welcomeGettingStarted/browser/media/ritemark-welcome-logo-full.svg" ] && \
             [ -f "$BUILD_DIR/resources/app/out/vs/workbench/contrib/welcomeGettingStarted/browser/media/ritemark-welcome-hero-bg.png" ]; then
            echo "OK: Welcome assets present"
          else
            echo "FAIL: Welcome assets missing"
            ERRORS=$((ERRORS + 1))
          fi

          if [ $ERRORS -gt 0 ]; then
            echo "Validation FAILED with $ERRORS error(s)"
            exit 1
          fi
          echo "Validation PASSED"

      - name: Upload ZIP artifact
        uses: actions/upload-artifact@v4
        with:
          name: ritemark-windows-x64
          path: r/VSCode-win32-x64/
          retention-days: 30

      - name: Build summary
        shell: bash
        working-directory: r
        run: |
          echo "========================================"
          echo "Windows Build Complete"
          echo "========================================"
          echo ""
          echo "Build contents:"
          ls -lh VSCode-win32-x64/ | head -10
          echo ""
          echo "Extension:"
          ls -lh VSCode-win32-x64/resources/app/extensions/ritemark/ | head -10
          echo ""
          echo "Artifact: ritemark-windows-x64"
          echo "NOTE: Build installer locally - see docs/BUILD-WINDOWS-INSTALLER.md"
