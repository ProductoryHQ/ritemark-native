name: Build Windows (x64)

on:
  workflow_dispatch:
  workflow_call:
  push:
    branches: [main]
    paths:
      - '.github/workflows/build-windows.yml'

jobs:
  build:
    runs-on: windows-latest

    steps:
      # =========================================================================
      # Step 1: Checkout + clone VS Code
      # =========================================================================
      - name: Configure Git for Windows
        shell: bash
        run: |
          git config --global core.longpaths true
          git config --global core.autocrlf false

      - name: Checkout RiteMark
        uses: actions/checkout@v4
        with:
          path: r

      - name: Clone VS Code OSS (1.94.0)
        shell: bash
        run: |
          git clone --depth 1 --branch 1.94.0 https://github.com/microsoft/vscode.git r/vscode
          echo "VS Code 1.94.0 cloned"

      # =========================================================================
      # Step 2: Setup toolchain
      # =========================================================================
      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # =========================================================================
      # Step 3: Handle extension symlink (Windows has no symlinks)
      # =========================================================================
      - name: Copy extension (replace symlink)
        shell: bash
        working-directory: r
        run: |
          rm -rf vscode/extensions/ritemark 2>/dev/null || true
          rm -rf extensions/ritemark/binaries/darwin-arm64 2>/dev/null || true
          cp -R extensions/ritemark vscode/extensions/ritemark
          echo "Extension copied to vscode/extensions/ritemark"

      # =========================================================================
      # Step 4: Install dependencies
      # =========================================================================
      - name: Install VS Code dependencies
        shell: bash
        working-directory: r/vscode
        env:
          npm_config_disturl: https://electronjs.org/headers
          npm_config_target: 30.5.1
          npm_config_runtime: electron
          npm_config_build_from_source: true
          ELECTRON_SKIP_BINARY_DOWNLOAD: 1
        run: |
          for i in 1 2 3; do
            echo "Attempt $i..."
            npm install && break || echo "Attempt $i failed, retrying..."
            sleep 10
          done

      - name: Install extension dependencies
        shell: bash
        working-directory: r/vscode/extensions/ritemark
        run: npm install

      # =========================================================================
      # Step 5: Apply patches + branding
      # =========================================================================
      - name: Apply patches
        shell: bash
        working-directory: r
        run: ./scripts/apply-patches.sh

      # =========================================================================
      # Step 6: Compile extension
      # =========================================================================
      - name: Compile extension
        shell: bash
        working-directory: r/vscode/extensions/ritemark
        run: npm run compile

      # =========================================================================
      # Step 7: Build VS Code for Windows x64
      # =========================================================================
      - name: Build VS Code (win32-x64-min)
        shell: bash
        working-directory: r/vscode
        run: |
          echo "Starting Windows build at $(date)"
          npm run gulp vscode-win32-x64-min
          echo "Build completed at $(date)"

      # =========================================================================
      # Step 8: Copy extension to build output
      # =========================================================================
      - name: Copy extension to build output
        shell: bash
        working-directory: r
        run: |
          BUILD_DIR="VSCode-win32-x64"
          EXT_DEST="$BUILD_DIR/resources/app/extensions/ritemark"

          if [ ! -d "$BUILD_DIR" ]; then
            echo "ERROR: Build output not found at $BUILD_DIR"
            exit 1
          fi

          rm -rf "$EXT_DEST" || true
          cp -R vscode/extensions/ritemark "$EXT_DEST"
          rm -rf "$EXT_DEST/webview/node_modules" 2>/dev/null || true
          rm -rf "$EXT_DEST/webview/src" 2>/dev/null || true
          echo "Extension copied successfully"

      # =========================================================================
      # Step 9: Validate build
      # =========================================================================
      - name: Validate build
        shell: bash
        working-directory: r
        run: |
          BUILD_DIR="VSCode-win32-x64"
          EXT_PATH="$BUILD_DIR/resources/app/extensions/ritemark"
          ERRORS=0

          # Check webview.js (must be >500KB)
          if [ -f "$EXT_PATH/media/webview.js" ]; then
            WEBVIEW_SIZE=$(wc -c < "$EXT_PATH/media/webview.js" | tr -d ' ')
            if [ "$WEBVIEW_SIZE" -lt 500000 ]; then
              echo "FAIL: webview.js too small ($WEBVIEW_SIZE bytes)"
              ERRORS=$((ERRORS + 1))
            else
              echo "OK: webview.js ($WEBVIEW_SIZE bytes)"
            fi
          else
            echo "FAIL: webview.js not found"
            ERRORS=$((ERRORS + 1))
          fi

          # Check extension.js (must be >1KB)
          if [ -f "$EXT_PATH/out/extension.js" ]; then
            EXTENSION_SIZE=$(wc -c < "$EXT_PATH/out/extension.js" | tr -d ' ')
            if [ "$EXTENSION_SIZE" -lt 1000 ]; then
              echo "FAIL: extension.js too small ($EXTENSION_SIZE bytes)"
              ERRORS=$((ERRORS + 1))
            else
              echo "OK: extension.js ($EXTENSION_SIZE bytes)"
            fi
          else
            echo "FAIL: extension.js not found"
            ERRORS=$((ERRORS + 1))
          fi

          if [ $ERRORS -gt 0 ]; then
            echo "Validation FAILED with $ERRORS error(s)"
            exit 1
          fi
          echo "Validation PASSED"

      # =========================================================================
      # Step 10: Build Windows installer (Inno Setup)
      # =========================================================================
      - name: Enable Windows long paths
        shell: pwsh
        run: |
          # Enable long path support (>260 chars) for Inno Setup
          # Required for node_modules with deep nesting
          New-ItemProperty -Path "HKLM:\SYSTEM\CurrentControlSet\Control\FileSystem" `
            -Name "LongPathsEnabled" -Value 1 -PropertyType DWORD -Force
          Write-Host "Long paths enabled"

      - name: Verify Inno Setup
        shell: bash
        run: |
          # Inno Setup is pre-installed on windows-latest
          ls -la "/c/Program Files (x86)/Inno Setup 6/ISCC.exe"

      - name: Build installer
        shell: pwsh
        working-directory: r
        run: |
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" "installer\windows\ritemark.iss"

      # =========================================================================
      # Step 11: Upload artifacts
      # =========================================================================
      - name: Upload ZIP artifact
        uses: actions/upload-artifact@v4
        with:
          name: ritemark-windows-x64
          path: r/VSCode-win32-x64/
          retention-days: 30

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: ritemark-windows-x64-installer
          path: r/installer-output/*.exe
          retention-days: 30

      # =========================================================================
      # Step 12: Build summary
      # =========================================================================
      - name: Build summary
        shell: bash
        working-directory: r
        run: |
          echo "========================================"
          echo "Windows Build Complete"
          echo "========================================"
          echo ""
          echo "Build contents:"
          ls -lh VSCode-win32-x64/ | head -10
          echo ""
          echo "Extension:"
          ls -lh VSCode-win32-x64/resources/app/extensions/ritemark/ | head -10
          echo ""
          echo "Installer:"
          ls -lh installer-output/ 2>/dev/null || echo "No installer output"
          echo ""
          echo "Artifacts: ritemark-windows-x64, ritemark-windows-x64-installer"
